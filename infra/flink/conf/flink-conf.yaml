jobmanager.rpc.address: jobmanager
jobmanager.memory.process.size: 1280m
jobmanager.memory.jvm-metaspace.size: 384m
taskmanager.memory.process.size: 2304m
taskmanager.memory.jvm-metaspace.size: 512m
taskmanager.numberOfTaskSlots: 4
parallelism.default: 2

state.backend.type: rocksdb
state.checkpoints.dir: file:///opt/flink/checkpoints
state.savepoints.dir: file:///opt/flink/savepoints
execution.checkpointing.interval: 30 s
execution.checkpointing.timeout: 10 min
execution.checkpointing.min-pause: 10 s
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.reporter.prom.port: 9249
