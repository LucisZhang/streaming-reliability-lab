# Light-path CI: lint, harness unit tests, Flink job build, dashboard build.
# The heavy Docker integration (make eo-verify / test-cdc: MySQL, Flink, MinIO)
# is intentionally NOT run in CI — it is a single-node Docker lab, run manually;
# its outputs are committed as auditable JSON under showcase/results/.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - name: Cache repo-local Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ hashFiles('flink-jobs/pom.xml') }}
      - name: Install harness requirements
        run: python -m pip install --disable-pip-version-check -r harness/requirements.txt
      - name: Lint (ruff, black, mypy, Maven verify)
        run: make lint PYTHON=python
      - name: Harness unit tests
        run: make test PYTHON=python

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build evidence dashboard (validates results JSON contract)
        run: make dashboard-build
