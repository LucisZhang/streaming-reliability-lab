name: ${COMPOSE_PROJECT_NAME:-p1_reliability_lab}

services:
  mysql:
    image: mysql:8.0.36
    profiles: ["core", "olap"]
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cdc_lab}
      MYSQL_USER: ${MYSQL_USER:-cdc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cdc_pw}
      ICEBERG_CATALOG_DATABASE: ${ICEBERG_CATALOG_DATABASE:-iceberg_catalog}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["core", "olap"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["core", "olap"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-warehouse}
    restart: "no"

  jobmanager:
    build:
      context: ./flink
      args:
        FLINK_IMAGE: flink:1.20.4-scala_2.12-java11
    image: p1-reliability-lab/flink:1.20.4-java11
    profiles: ["core", "olap"]
    command: jobmanager
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    ports:
      - "${FLINK_REST_PORT:-8081}:8081"
      - "9249:9249"
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8081/overview >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  taskmanager:
    build:
      context: ./flink
      args:
        FLINK_IMAGE: flink:1.20.4-scala_2.12-java11
    image: p1-reliability-lab/flink:1.20.4-java11
    profiles: ["core", "olap"]
    command: taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://jobmanager:8081/taskmanagers | grep -q taskmanagers",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  mysql_data:
  minio_data:
  flink_checkpoints:
  flink_savepoints:
